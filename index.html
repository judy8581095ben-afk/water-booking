<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清悦淨水企業 - 線上預約</title>
  
  <!-- 🌟 設定給 LINE / Facebook 顯示的預覽小字 -->
  <meta name="description" content="花蓮Ro逆滲透預約系統">
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 FontAwesome 圖庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 載入最穩定的 React 來源 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-50 via-rose-50 to-blue-50 min-h-screen">

  <!-- 網頁內容會掛載到這個區塊 -->
  <div id="root">
    <!-- 載入中提示畫面 -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif;">
      <i class="fa-solid fa-droplet" style="color: #60a5fa; font-size: 40px; margin-bottom: 15px;"></i>
      <h2 style="color: #db2777; margin-bottom: 10px; font-weight: bold;">花蓮Ro逆滲透預約系統 🫧</h2>
      <p style="color: #6b7280; font-size: 14px;">正在為您準備預約畫面...</p>
    </div>
  </div>

  <!-- 預約小卡核心程式碼 -->
  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('price');

      const tabs = [
        { id: 'price', label: '價目表', icon: <i className="fa-solid fa-list text-sm"></i> },
        { id: 'notice', label: '預約須知', icon: <i className="fa-solid fa-circle-info text-sm"></i> },
        { id: 'faq', label: '常見問題', icon: <i className="fa-solid fa-circle-question text-sm"></i> },
        { id: 'book', label: '我要預約', icon: <i className="fa-solid fa-calendar-check text-sm"></i> },
      ];

      return (
        <div className="min-h-screen flex items-center justify-center p-4 font-sans text-gray-700">
          <div className="w-full max-w-sm bg-white/80 backdrop-blur-md rounded-[2rem] shadow-xl overflow-hidden border border-white/50 relative">
            <div className="absolute top-[-50px] left-[-50px] w-32 h-32 bg-pink-200/40 rounded-full blur-2xl"></div>
            <div className="absolute bottom-[-50px] right-[-50px] w-40 h-40 bg-blue-200/40 rounded-full blur-2xl"></div>

            <div className="pt-8 pb-6 px-6 text-center relative z-10">
              <div className="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-tr from-pink-200 to-blue-100 rounded-full mb-4 shadow-sm border-2 border-white">
                <i className="fa-solid fa-droplet text-blue-400 text-3xl drop-shadow-sm"></i>
              </div>
              <h1 className="text-2xl font-bold tracking-wider text-gray-800 flex items-center justify-center gap-2">
                清悦淨水企業
                <i className="fa-solid fa-wand-magic-sparkles text-pink-400 text-lg"></i>
              </h1>
              <p className="text-sm text-gray-500 mt-2 tracking-wide">為您帶來純淨甘甜的好水生活 🫧</p>
            </div>

            <div className="px-4 relative z-10">
              <div className="flex justify-between bg-pink-50/50 p-1 rounded-2xl">
                {tabs.map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex flex-col items-center justify-center w-full py-2.5 rounded-xl text-xs font-medium transition-all duration-300 ${
                      activeTab === tab.id ? 'bg-white text-pink-500 shadow-sm scale-105' : 'text-gray-400 hover:text-pink-400'
                    }`}
                  >
                    <div className="mb-1">{tab.icon}</div>
                    {tab.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="p-6 relative z-10 min-h-[320px]">
              {activeTab === 'price' && <PriceContent />}
              {activeTab === 'notice' && <NoticeContent />}
              {activeTab === 'faq' && <FAQContent />}
              {activeTab === 'book' && <BookContent />}
            </div>
            
            <div className="py-4 text-center text-xs text-pink-300/80 bg-white/30">
              Made with <i className="fa-solid fa-heart text-pink-300 text-[12px] inline-block mx-1"></i> for your health
            </div>
          </div>
        </div>
      );
    }

    function PriceContent() {
      const [selectedModel, setSelectedModel] = useState('S13U');
      const priceData = {
        S13U: [
          { title: '前三道濾心', desc: '半年保養', price: 'NT$ 800', isHot: true },
          { title: '後置活性碳', desc: '一年保養', price: 'NT$ 400', isHot: false },
          { title: 'RO膜濾心', desc: '延長淨水器使用壽命(兩年保養)', price: 'NT$ 1,700', isHot: false },
        ],
        DF400: [
          { title: 'DF400 第一道前置濾心', desc: '建議半年更換', price: 'NT$ 850', isHot: true },
          { title: 'DF400 第二道RO濾心', desc: '建議兩年更換', price: 'NT$ 3,000', isHot: false },
          { title: 'DF400 第三道後置濾心', desc: '建議一年更換', price: 'NT$ 800', isHot: false },
        ]
      };

      return (
        <div className="animate-[fadeIn_0.5s_ease-out]">
          <h2 className="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-pink-400"></span>服務價目表
          </h2>
          
          <div className="flex bg-pink-50/50 p-1 rounded-xl mb-4">
            <button onClick={() => setSelectedModel('S13U')} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${selectedModel === 'S13U' ? 'bg-white text-pink-500 shadow-sm' : 'text-gray-400 hover:text-pink-400'}`}>S13U 五道式</button>
            <button onClick={() => setSelectedModel('DF400')} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${selectedModel === 'DF400' ? 'bg-white text-pink-500 shadow-sm' : 'text-gray-400 hover:text-pink-400'}`}>DF400</button>
          </div>

          <div className="space-y-3">
            
            {/* 🌟 完美的圖片顯示區塊 (S13U) */}
            {selectedModel === 'S13U' && (
              <div className="bg-white p-3 rounded-2xl shadow-sm border border-pink-50 flex justify-center items-center mb-2">
                <img 
                  src="17.png" 
                  alt="S13U 五道式 RO逆滲透" 
                  className="w-full h-auto max-h-48 object-contain rounded-lg drop-shadow-sm"
                  onError={(e) => { 
                    /* 如果找不到圖片，就把整個白框框藏起來 */
                    e.target.parentNode.style.display = 'none'; 
                  }} 
                />
              </div>
            )}

            {/* 🌟 新增：完美的圖片顯示區塊 (DF400) */}
            {selectedModel === 'DF400' && (
              <div className="bg-white p-3 rounded-2xl shadow-sm border border-pink-50 flex justify-center items-center mb-2">
                <img 
                  src="DF-400.jpg" 
                  alt="DF400 淨水器" 
                  className="w-full h-auto max-h-48 object-contain rounded-lg drop-shadow-sm"
                  onError={(e) => { 
                    /* 如果找不到圖片，就把整個白框框藏起來 */
                    e.target.parentNode.style.display = 'none'; 
                  }} 
                />
              </div>
            )}

            {priceData[selectedModel].map((item, idx) => (
              <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-pink-50 flex justify-between items-center transition-transform hover:-translate-y-1">
                <div>
                  <div className="font-medium text-gray-800 flex items-center gap-2">{item.title}{item.isHot && <span className="text-[10px] bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full">推薦</span>}</div>
                  <div className="text-xs text-gray-400 mt-1">{item.desc}</div>
                </div>
                <div className="font-bold text-pink-500">{item.price}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function NoticeContent() {
      const notices = [
        '為了提供最完善的服務，保養請提早至少 3 天預約喔！', 
        '若臨時有事需要更改時間，請於前一日告知我們 ♡', 
        '技師到府前會先以電話聯繫，請留意手機。', 
        '希望預約時間重疊或無法前往會另外通知聯絡(建議以平日上班時間早上9點至晚上7點)'
      ];
      return (
        <div className="animate-[fadeIn_0.5s_ease-out] h-full flex flex-col">
          <h2 className="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-blue-400"></span>預約小叮嚀</h2>
          <div className="bg-blue-50/50 p-5 rounded-2xl flex-grow">
            <ul className="space-y-4">
              {notices.map((text, idx) => (
                <li key={idx} className="flex items-start gap-3 text-sm text-gray-600 leading-relaxed">
                  <i className="fa-solid fa-circle-check text-blue-300 text-lg shrink-0 mt-0.5"></i><span>{text}</span>
                </li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    function FAQContent() {
      const faqs = [
        { q: '淨水器多久需要保養一次呢？', a: '建議每半年進行一次基礎保養，讓水質保持最佳狀態！' },
        { q: '可以指定保養時間嗎？', a: '可以的！請在預約時段選單中選擇您方便的時間。' }
      ];
      return (
        <div className="animate-[fadeIn_0.5s_ease-out]">
          <h2 className="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-rose-400"></span>常見問答</h2>
          <div className="space-y-4">
            {faqs.map((faq, idx) => (
              <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-rose-50">
                <div className="font-medium text-gray-800 text-sm mb-2 flex items-center gap-2"><span className="bg-rose-100 text-rose-500 w-5 h-5 rounded-full flex items-center justify-center text-xs shrink-0">Q</span>{faq.q}</div>
                <div className="text-sm text-gray-500 leading-relaxed flex items-start gap-2 pl-1"><span className="text-rose-300 font-bold text-xs mt-0.5 shrink-0">A.</span>{faq.a}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function BookContent() {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [formData, setFormData] = useState({ name: '', phone: '', address: '', model: '', date: '', time: '' });

      const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd1jUAvul8FMMjNYqh8hUCSaUc9lqOrvOnL_-bf_fh2FWYsPg/formResponse";

      const generateTimeOptions = () => {
        const options = [];
        for (let h = 9; h <= 20; h++) {
          const hourStr = h < 10 ? `0${h}` : `${h}`;
          options.push(`${hourStr}:00`);
          options.push(`${hourStr}:30`);
        }
        return options;
      };

      const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsLoading(true);

        const submitData = new URLSearchParams();
        submitData.append("entry.1304595996", formData.name);
        submitData.append("entry.540732142", formData.phone);
        submitData.append("entry.441381575", formData.address);
        submitData.append("entry.1690385759", formData.model);
        submitData.append("entry.2031500325", formData.date);
        submitData.append("entry.325500292", formData.time);

        try {
          await fetch(GOOGLE_FORM_URL, { 
            method: "POST", 
            mode: "no-cors", 
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: submitData.toString()
          });
          setIsSubmitted(true);
        } catch (error) {
          console.error("Submission error:", error);
          setIsSubmitted(true);
        } finally {
          setIsLoading(false);
        }
      };

      if (isSubmitted) {
        return (
          <div className="animate-[zoomIn_0.3s_ease-out] flex flex-col items-center justify-center h-full py-8 text-center">
            <div className="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mb-4">
              <i className="fa-solid fa-heart text-pink-400 text-4xl"></i>
            </div>
            <h3 className="text-xl font-bold text-gray-800 mb-2">預約已送出！</h3>
            <p className="text-sm text-gray-500 mb-6">我們已收到您的資訊，<br />客服人員將儘速與您確認 🫧</p>
            <button onClick={() => setIsSubmitted(false)} className="px-6 py-2 bg-pink-100 text-pink-600 rounded-full text-sm font-medium hover:bg-pink-200 transition-colors">
              返回表單
            </button>
          </div>
        );
      }

      return (
        <div className="animate-[fadeIn_0.5s_ease-out]">
          <h2 className="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-pink-400"></span>填寫預約資料</h2>
          <form onSubmit={handleSubmit} className="space-y-4">
            <input name="name" value={formData.name} onChange={handleChange} type="text" required placeholder="您的稱呼" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-none text-sm focus:ring-2 focus:ring-pink-300 outline-none" />
            <input name="phone" value={formData.phone} onChange={handleChange} type="tel" required placeholder="聯絡電話" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-none text-sm focus:ring-2 focus:ring-pink-300 outline-none" />
            <input name="address" value={formData.address} onChange={handleChange} type="text" required placeholder="服務地址" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-none text-sm focus:ring-2 focus:ring-pink-300 outline-none" />
            <select name="model" value={formData.model} onChange={handleChange} required className="w-full px-4 py-3 rounded-xl bg-gray-50 border-none text-sm text-gray-600 focus:ring-2 focus:ring-pink-300 outline-none appearance-none cursor-pointer">
              <option value="" disabled>請選擇您的機器型號</option>
              <option value="S13U 五道式 RO逆滲透">S13U 五道式 RO逆滲透</option>
              <option value="DF400+">DF400+</option>
              <option value="其他機型 / 不確定">其他機型 / 不確定</option>
            </select>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="block text-[10px] text-pink-400 mb-1 ml-1 font-medium">預約日期</label>
                <input name="date" value={formData.date} onChange={handleChange} type="date" required className="w-full px-4 py-3 rounded-xl bg-gray-50 border-none text-xs text-gray-600 focus:ring-2 focus:ring-pink-300 outline-none" />
              </div>
              <div>
                <label className="block text-[10px] text-pink-400 mb-1 ml-1 font-medium">預約時段</label>
                <div className="relative">
                  <select name="time" value={formData.time} onChange={handleChange} required className="w-full px-4 py-3 rounded-xl bg-gray-50 border-none text-xs text-gray-600 focus:ring-2 focus:ring-pink-300 outline-none appearance-none cursor-pointer">
                    <option value="" disabled>時間</option>
                    {generateTimeOptions().map(time => <option key={time} value={time}>{time}</option>)}
                  </select>
                  <i className="fa-regular fa-clock absolute right-3 top-1/2 -translate-y-1/2 text-pink-300 text-xs pointer-events-none"></i>
                </div>
              </div>
            </div>
            <button type="submit" disabled={isLoading} className="w-full mt-2 py-3 bg-gradient-to-r from-pink-400 to-rose-400 text-white rounded-xl font-medium shadow-md transition-all hover:-translate-y-0.5 disabled:opacity-50">
              {isLoading ? "傳送中..." : "送出預約"}
            </button>
          </form>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!-- 動畫效果設定 -->
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</body>
</html>
